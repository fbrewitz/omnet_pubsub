[General]
network = PubSubSafetyNetworkPtP
sim-time-limit = 1s # For simulation


# Enable global for performance metrics
**.statistic-recording = true 
**.scalar-recording = true # Turn these two off "globally" if I only want to enable certain, specific signals
**.vector-recording = true
record-eventlog = true

*.visualizer.osgVisualizer.typename = ""   # empty -> inactivate

## Configurator - set IP addresses, create routing tables, configure multicast
*.configurator.typename = "Ipv4NetworkConfigurator"
*.configurator.addStaticRoutes = false # Change to true if we use a router instead


## Publisher in Node A - still just a usual UdpBasicApp, it does not receive anything
# Here is where you set all the desired parameters (defined in the Publisher class and the simple module)
*.nodeA.numApps = 2 # number of applications on the publisher, we only use the newly created Publisher application, that inherits from UdpBasicApp
*.nodeA.app[0].typename = "Publisher"
*.nodeA.app[0].destAddresses = "239.1.1.1" 
*.nodeA.app[0].destPort = 5000  # send to Sub in node B 
*.nodeA.app[0].messageLength = 1500B 
*.nodeA.app[0].sendInterval = 10ms      # + normal(0s, 0.001s) # introduce jitter
## PubSub specific parameters for the simulation 
*.nodeA.app[0].publishedDataSet = 15.2us
*.nodeA.app[0].dataSetWriter = 15.2us
*.nodeA.app[0].writerGroup = 15.2us
*.nodeA.app[0].processingSendTime = 9.49us

## Subscriber in Node A - could still be UdpSink, statistics for RTT
*.nodeA.app[1].typename = "Subscriber"
*.nodeA.app[1].localPort = 6000
*.nodeA.app[1].multicastGroup = "239.1.1.1"  
*.nodeA.ipv4.igmp.enabled = true  
*.nodeA.app[1].subscribedDataSet = 129.073us
*.nodeA.app[1].dataSetReader = 129.073us
*.nodeA.app[1].readerGroup = 129.073us
*.nodeA.app[1].processingRecTime = 108.57us



## Subscriber in Node B - must be UdpBasicApp in order for it to have a sendInterval and the "Sending" logic already there (time consuming and not so well-documented to extend the 
##                        UdpSink with the sending logic, easier to adapt UdpBasicApp, since it is written in the documentation that a UdpBasicApp could be peered with another UdpBasicApp
*.nodeB.numApps = 2
*.nodeB.app[0].typename = "SubscriberSafety"
*.nodeB.app[0].messageLength = 1500B 
*.nodeB.app[0].destAddresses = "127.0.0.1" 
*.nodeB.app[0].destPort = 4000  # send to Pub in node B 
*.nodeB.app[0].localPort = 5000   # this parameter also exists for UdpBasicApp
*.nodeB.app[0].joinLocalMulticastGroups = true 
*.nodeB.ipv4.igmp.enabled = true  
*.nodeB.app[0].subscribedDataSet = 129.073us
*.nodeB.app[0].dataSetReader = 129.073us
*.nodeB.app[0].readerGroup = 129.073us
*.nodeB.app[0].processingRecTime = 108.57us
*.nodeB.app[0].sendInterval = 10ms #it only sends/copys the received packet to the Publisher in the same node


## Publisher in Node B - must be UdpBasicApp, just a usual Publisher, but it also has added functionality in processPacket(), receives from Sub and measures delta, emits the statistics
##                       It has its own sendInterval and only receives the packet from the Subscriber, it does not do anyhting else with the packet
*.nodeB.app[1].typename = "PublisherSafety"
*.nodeB.app[1].messageLength = 1500B 
*.nodeB.app[1].destAddresses = "239.1.1.1" 
*.nodeB.app[1].localPort = 4000
*.nodeB.app[1].destPort = 6000  # Send to Sub in node A
*.nodeB.app[1].multicastInterface = "eth0"
*.nodeB.app[1].sendInterval = 10ms
*.nodeB.app[1].publishedDataSet = 15.2us
*.nodeB.app[1].dataSetWriter = 15.2us
*.nodeB.app[1].writerGroup = 15.2us
*.nodeB.app[1].processingSendTime = 9.49us




