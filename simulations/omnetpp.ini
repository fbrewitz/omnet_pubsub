[General]
network = PubSubNetwork
sim-time-limit = 1s # For simulation
*.numSubscribers = 50 # number of subscribers in the network
*.numPublishers = 1


# Enable global for performance metrics
**.statistic-recording = true 
**.scalar-recording = true # Turn these two off "globally" if I only want to enable certain, specific signals
**.vector-recording = true
record-eventlog = true

*.visualizer.osgVisualizer.typename = ""   

## Configurator - set IP addresses, create routing tables, configure multicast
*.configurator.typename = "Ipv4NetworkConfigurator"
*.configurator.addStaticRoutes = false # Change to true if we use a router instead


## Publisher
# Here is where you set all the desired parameters (defined in the Publisher class and the simple module)
# The "publisher" here refers to the name of the node, and not the custom PublisherApp class. This node could have any name
*.publisher[*].numApps = 1 # number of applications on the publisher, we only use the newly created Publisher application, that inherits from UdpBasicApp
*.publisher[*].app[0].typename = "PublisherApp"
*.publisher[*].app[0].destAddresses = "239.1.1.1" 
*.publisher[*].app[0].localPort = 6000
*.publisher[*].app[0].destPort = 5000
*.publisher[*].app[0].joinLocalMulticastGroups = false 
*.publisher[*].app[0].messageLength = 1500B 
*.publisher[*].app[0].sendInterval = 100ms # If it is o finterest to add jitter, include for example : + exponential(0.2s) 
*.publisher[*].app[0].multicastInterface = "eth0" 
## PubSub specific parameters for the simulation 
*.publisher[*].app[0].publishedDataSet = 15.2us
*.publisher[*].app[0].dataSetWriter = 15.2us
*.publisher[*].app[0].writerGroup = 15.2us
*.publisher[*].app[0].processingSendTime = 9.49us


## Subscribers
*.subscriber[*].numApps = 1
*.subscriber[*].app[0].typename = "SubscriberApp"
*.subscriber[*].app[0].localPort = 5000   
*.subscriber[*].app[0].multicastGroup = "239.1.1.1"   # this is only available for UdpSink
*.subscriber[*].ipv4.igmp.enabled = true 
## PubSub specific parameters for the simulation
*.subscriber[*].app[0].subscribedDataSet = 129.073us
*.subscriber[*].app[0].dataSetReader = 129.073us
*.subscriber[*].app[0].readerGroup = 129.073us
*.subscriber[*].app[0].processingRecTime = 108.57us







